<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes" />
  <meta name="color-scheme" content="light only" />
  <title>사진 업로드</title>
  <style>
    @font-face {
      font-family: KoreanHand;
      src: url("/fonts/Cafe24SsurroundAir-v1.1.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      unicode-range:
        U+0030-0039,
        U+FF10-FF19,
        U+1100-11FF,
        U+3130-318F,
        U+AC00-D7AF;
    }
    :root {
      --bg: #f7dede;
      --panel: #fff;
      --text: #111;
      --muted: #777;
      --border: #eee;
      --primary: #ebadad;
      --toast: rgba(40, 30, 30, 0.88);
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: KoreanHand, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 20px 14px;
      box-sizing: border-box;
    }
    .panel {
      width: min(720px, 100%);
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 16px 60px rgba(0, 0, 0, .18);
      overflow: hidden;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #f7f7f7;
      border-bottom: 1px solid var(--border);
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0;
      padding: 0 16px 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .body {
      padding: 14px 16px;
      display: grid;
      gap: 12px;
    }
    .upload-file {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #fafafa;
      border: 1px solid var(--border);
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .status {
      font-size: 12px;
      color: #999;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }
    .list {
      margin: 0;
      padding-left: 16px;
      color: #666;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
    }
    .list li { margin: 4px 0; }
    .bottom {
      padding: 12px 16px 16px;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-radius: 10px;
      border: 0;
      background: #fff;
      color: #444;
      font-size: 14px;
      cursor: pointer;
      min-width: 140px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
      text-decoration: none;
    }
    .btn.primary {
      background: var(--primary);
      color: #fff;
      box-shadow: none;
    }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }
    .copy-toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: var(--toast);
      color: #fff;
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 999px;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 9999;
    }
    .copy-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .lead {
      margin: 12px 0;
      padding: 15px 20px 20px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel" aria-label="사진 업로드">
      <div class="top">
        <div class="title">사진 업로드</div>
      </div>
      <p class="lead">신랑 신부의 특별한 순간을 담아주세요.❤️📸<br>한 분 한 분의 정성 어린 사진들이 <br>저희 부부에게 평생 잊지 못할 선물이 될 것입니다.
      <br><br>신랑 강동현 신부 유하연 드림.</p>
      <p class="sub">
        여러 장을 한 번에 선택해 업로드할 수 있어요. 한 번에 최대 20장까지 업로드 가능합니다.
      </p>
      <div class="body">
        <div class="upload-file">
          <div class="row">
            <div class="status" id="photoUploadStatus">사진을 선택해 주세요.</div>
            <button type="button" class="btn" id="photoPickBtn">사진 선택</button>
            <input id="photoUploadInput" type="file" accept="image/*" multiple style="position:absolute; left:-9999px; width:1px; height:1px;" />
          </div>
          <div class="hint">
            파일은 원본 그대로 업로드됩니다. (네트워크 상황에 따라 시간이 걸릴 수 있습니다.)
          </div>
          <ul class="list" id="photoUploadList" aria-label="선택한 파일 목록"></ul>
        </div>
      </div>
      <div class="bottom">
        <button type="button" class="btn primary" id="photoUploadBtn" disabled>업로드</button>
      </div>
    </section>
  </main>

  <div class="copy-toast" id="copyToast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      var MAX_UPLOAD_FILES = 20;

      // Cloudinary (unsigned 업로드)
      var cloudinaryUrl = "https://api.cloudinary.com/v1_1/da2xijfim/image/upload";
      var cloudinaryUploadPreset = "weddingpics";

      var pickBtn = document.getElementById("photoPickBtn");
      var fileInput = document.getElementById("photoUploadInput");
      var uploadBtn = document.getElementById("photoUploadBtn");
      var fileList = document.getElementById("photoUploadList");
      var statusEl = document.getElementById("photoUploadStatus");
      var toast = document.getElementById("copyToast");
      var toastTimer = 0;

      var selectedFiles = [];
      var isUploading = false;

      function showToast(msg) {
        if (!toast) return;
        toast.textContent = msg || "";
        toast.classList.add("is-visible");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("is-visible");
        }, 1400);
      }

      function formatBytes(n) {
        if (!n && n !== 0) return "";
        if (n < 1024) return n + " B";
        var kb = n / 1024;
        if (kb < 1024) return kb.toFixed(1) + " KB";
        var mb = kb / 1024;
        return mb.toFixed(1) + " MB";
      }

      function setStatus(msg) {
        if (!statusEl) return;
        statusEl.textContent = msg || "";
      }

      function renderFileList() {
        if (!fileList) return;
        fileList.innerHTML = "";
        if (!selectedFiles.length) return;
        selectedFiles.forEach(function (f) {
          var li = document.createElement("li");
          li.textContent = f.name + " (" + formatBytes(f.size) + ")";
          fileList.appendChild(li);
        });
      }

      function setUploadingState(next) {
        isUploading = !!next;
        if (pickBtn) pickBtn.disabled = isUploading;
        if (fileInput) fileInput.disabled = isUploading;
        if (uploadBtn) uploadBtn.disabled = isUploading || selectedFiles.length === 0;
      }

      function uploadOne(file) {
        var fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", cloudinaryUploadPreset);
        return fetch(cloudinaryUrl, { method: "POST", body: fd }).then(function (res) {
          if (!res.ok) throw new Error("upload failed: " + res.status);
          return res.json();
        });
      }

      if (pickBtn && fileInput) {
        pickBtn.addEventListener("click", function () {
          fileInput.click();
        });
      }

      if (fileInput) {
        fileInput.addEventListener("change", function () {
          selectedFiles = Array.prototype.slice.call(fileInput.files || []);
          if (selectedFiles.length > MAX_UPLOAD_FILES) {
            selectedFiles = selectedFiles.slice(0, MAX_UPLOAD_FILES);
            showToast("한 번에 최대 " + MAX_UPLOAD_FILES + "장까지 업로드 가능해요.");
          }
          renderFileList();
          if (selectedFiles.length) setStatus(selectedFiles.length + "장 선택됨 (최대 " + MAX_UPLOAD_FILES + "장)");
          else setStatus("사진을 선택해 주세요.");
          if (uploadBtn) uploadBtn.disabled = isUploading || selectedFiles.length === 0;
        });
      }

      if (uploadBtn) {
        uploadBtn.addEventListener("click", function () {
          if (isUploading) return;
          if (!selectedFiles.length) {
            showToast("업로드할 사진을 먼저 선택해 주세요.");
            return;
          }
          if (selectedFiles.length > MAX_UPLOAD_FILES) {
            selectedFiles = selectedFiles.slice(0, MAX_UPLOAD_FILES);
            showToast("한 번에 최대 " + MAX_UPLOAD_FILES + "장까지 업로드 가능해요.");
            renderFileList();
            setStatus(selectedFiles.length + "장 선택됨 (최대 " + MAX_UPLOAD_FILES + "장)");
          }

          setUploadingState(true);
          setStatus("업로드 중... (0 / " + selectedFiles.length + ")");

          var done = 0;
          var tasks = selectedFiles.map(function (f) {
            return uploadOne(f).then(function () {
              done += 1;
              setStatus("업로드 중... (" + done + " / " + selectedFiles.length + ")");
            });
          });

          Promise.all(tasks).then(function () {
            setUploadingState(false);
            showToast("업로드 완료");
            setStatus("업로드 완료! 감사합니다.");
            selectedFiles = [];
            if (fileInput) fileInput.value = "";
            renderFileList();
          }).catch(function () {
            setUploadingState(false);
            alert("업로드에 실패했습니다. 잠시 후 다시 시도해 주세요.");
            setStatus("업로드 실패");
          });
        });
      }

      setUploadingState(false);
    })();
  </script>
</body>
</html>
